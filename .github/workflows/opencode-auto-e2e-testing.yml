name: OpenCode Auto E2E Testing

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Specific module/feature to add E2E tests'
        required: false
        type: string

concurrency:
  group: auto-e2e-testing
  cancel-in-progress: false

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  DATABASE_DRIVER: node
  # === ALL VALUES BELOW ARE E2E TEST MOCKS ONLY - NOT REAL SECRETS ===
  KEY_VAULTS_SECRET: LA7n9k3JdEcbSgml2sxfw+4TV1AzaaFU5+R176aQz4s=
  AUTH_SECRET: e2e-test-secret-key-for-better-auth-32chars!
  AUTH_EMAIL_VERIFICATION: '0'
  S3_ACCESS_KEY_ID: e2e-mock-access-key
  S3_SECRET_ACCESS_KEY: e2e-mock-secret-key
  S3_BUCKET: e2e-mock-bucket
  S3_ENDPOINT: https://e2e-mock-s3.localhost

jobs:
  add-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      postgres:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run database migrations
        run: bun run db:migrate

      - name: Build application
        run: bun run build
        env:
          SKIP_LINT: '1'

      - name: Setup OpenCode & Oh-My-OpenCode
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g opencode-ai oh-my-openagent
          oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=yes --skip-auth

      - name: Install Python deps & Configure models
        env:
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          python custom_scripts/pick_best_model.py --opencode-config > opencode.json
          mkdir -p ~/.config/opencode
          cp opencode.json ~/.config/opencode/opencode.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode for Auto E2E Testing
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_MODULE: ${{ inputs.target_module }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          
          BEST_MODEL=$(python custom_scripts/pick_best_model.py)
          if [ "$BEST_MODEL" = "NO_MODEL_AVAILABLE" ]; then
            echo "::error::无可用模型"
            exit 1
          fi
          echo "选定模型: $BEST_MODEL"
          
          if [ -n "$TARGET_MODULE" ]; then
            TASK_DESC="为指定功能 '${TARGET_MODULE}' 添加E2E测试。"
          else
            TASK_DESC="分析仓库的E2E测试覆盖情况，自动选择一个需要E2E覆盖的功能模块，添加E2E测试。"
          fi
          
          PROMPT="E2E测试任务。仓库: $REPO, 分支: $BRANCH, 运行ID: $RUN_ID。$TASK_DESC"
          PROMPT="$PROMPT 环境: PostgreSQL localhost:5432, App已构建, Playwright已安装。启动服务器: bunx next start -p 3006 & 然后 cd e2e && BASE_URL=http://localhost:3006 pnpm exec cucumber-js --config cucumber.config.js --tags '<your-tags>'"
          PROMPT="$PROMPT 工作流程: 1) 分析现有E2E测试 2) 分析待测功能 3) 编写E2E测试 4) 启动服务并运行验证 5) 创建PR。"
          
          oh-my-opencode run --model "$BEST_MODEL" "$PROMPT" 2>&1 | tee opencode_output.log || true
          
          if grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
            echo "::warning::oh-my-opencode 异常，fallback 到 opencode..."
            opencode run --model "$BEST_MODEL" "$PROMPT" 2>&1 | tee opencode_output.log || true
          fi
          
          rm -f opencode_output.log
          
          echo "=== 🔍 推送前语法校验 ==="
          python custom_scripts/validate_syntax.py
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "无代码变更"
            exit 0
          fi
          
          git add -A
          git commit -m "✅ test: OpenCode auto E2E testing coverage improvement" || true
          
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" != "main" && "$BRANCH" != "master" ]]; then
            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "✅ test: auto E2E testing coverage" \
              --body "Automatic E2E test coverage improvement by OpenCode." || true
          fi

      - name: Upload E2E test artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-artifacts
          path: |
            e2e/reports
            e2e/screenshots
          if-no-files-found: ignore
