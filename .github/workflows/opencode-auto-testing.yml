name: OpenCode Auto Testing Coverage
description: Automatically add unit tests to improve code coverage

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Specific module to add tests'
        required: false
        type: string

concurrency:
  group: auto-testing
  cancel-in-progress: false

jobs:
  add-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup OpenCode & Oh-My-OpenCode
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g opencode-ai oh-my-openagent
          oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=yes --skip-auth

      - name: Install Python deps & Configure models
        env:
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          python custom_scripts/pick_best_model.py --opencode-config > opencode.json
          mkdir -p ~/.config/opencode
          cp opencode.json ~/.config/opencode/opencode.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode for Auto Testing
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET_MODULE: ${{ inputs.target_module }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          
          BEST_MODEL=$(python custom_scripts/pick_best_model.py)
          if [ "$BEST_MODEL" = "NO_MODEL_AVAILABLE" ]; then
            echo "::error::无可用模型"
            exit 1
          fi
          echo "选定模型: $BEST_MODEL"
          
          if [ -n "$TARGET_MODULE" ]; then
            TASK_DESC="为指定模块 '${TARGET_MODULE}' 添加单元测试，提高代码覆盖率。"
          else
            TASK_DESC="分析仓库代码覆盖率，自动选择一个需要补充测试的模块，为该模块添加单元测试。"
          fi
          
          PROMPT="测试任务。仓库: $REPO, 分支: $BRANCH, 运行ID: $RUN_ID。$TASK_DESC"
          PROMPT="$PROMPT 工作流程: 1) 运行现有测试了解覆盖率 2) 分析待测代码 3) 编写测试 4) 运行验证通过 5) 创建PR。"
          
          oh-my-opencode run --model "$BEST_MODEL" "$PROMPT" 2>&1 | tee opencode_output.log || true
          
          if grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
            echo "::warning::oh-my-opencode 异常，fallback 到 opencode..."
            opencode run --model "$BEST_MODEL" "$PROMPT" 2>&1 | tee opencode_output.log || true
          fi
          
          rm -f opencode_output.log
          
          echo "=== 🔍 推送前语法校验 ==="
          python custom_scripts/validate_syntax.py
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "无代码变更"
            exit 0
          fi
          
          git add -A
          git commit -m "✅ test: OpenCode auto-testing coverage improvement" || true
          
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" != "main" && "$BRANCH" != "master" ]]; then
            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "✅ test: auto testing coverage" \
              --body "Automatic test coverage improvement by OpenCode." || true
          fi
