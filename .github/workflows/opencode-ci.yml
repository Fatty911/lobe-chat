name: OpenCode CI

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom prompt for OpenCode'
        required: false

jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@opencode')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@opencode')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@opencode')) ||
      (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '@opencode') || contains(github.event.issue.title, '@opencode'))) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup OpenCode & Oh-My-OpenCode
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g opencode-ai oh-my-openagent
          oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=yes --skip-auth

      - name: Configure OpenCode models
        env:
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          python custom_scripts/pick_best_model.py --opencode-config > opencode.json
          mkdir -p ~/.config/opencode
          cp opencode.json ~/.config/opencode/opencode.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode Agent
        id: opencode
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ACTION_WRITE: ${{ secrets.ACTION_WRITE }}
        run: |
          set -euo pipefail
          
          BEST_MODEL=$(python custom_scripts/pick_best_model.py)
          SMALL_MODEL=$(python custom_scripts/pick_best_model.py --small)
          echo "选定模型: $BEST_MODEL (轻量: $SMALL_MODEL)"
          
          if [ "$BEST_MODEL" = "NO_MODEL_AVAILABLE" ]; then
            echo "::error::无可用模型"
            exit 1
          fi
          
          PROMPT=""
          case "${{ github.event_name }}" in
            issue_comment)
              PROMPT="${{ github.event.comment.body }}"
              ;;
            issues)
              PROMPT="${{ github.event.issue.title }} ${{ github.event.issue.body }}"
              ;;
            pull_request_review)
              PROMPT="${{ github.event.review.body }}"
              ;;
            pull_request_review_comment)
              PROMPT="${{ github.event.comment.body }}"
              ;;
            workflow_dispatch)
              PROMPT="${{ inputs.prompt }}"
              ;;
          esac
          
          PROMPT="${PROMPT//@opencode/}"
          
          AGENTS_PROMPT=""
          if [ -f "AGENTS.md" ]; then
            AGENTS_PROMPT="【全局要求 - 必须遵守】$(cat AGENTS.md)"
          fi
          
          FIX_SUCCEEDED=false
          
          echo "尝试 oh-my-opencode run..."
          oh-my-opencode run --model "$BEST_MODEL" "$AGENTS_PROMPT\n\n用户通过 @opencode 请求: $PROMPT\n\n请分析问题、制定计划、实施修复。完成后提交代码并回复。" 2>&1 | tee opencode_output.log || true
          
          if grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
            echo "::warning::oh-my-opencode 异常，尝试 opencode..."
            opencode run --model "$BEST_MODEL" "$AGENTS_PROMPT\n\n用户请求: $PROMPT" 2>&1 | tee opencode_output.log || true
            if ! grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
              FIX_SUCCEEDED=true
            fi
          else
            FIX_SUCCEEDED=true
          fi
          
          rm -f opencode_output.log
          
          if [ "$FIX_SUCCEEDED" != "true" ]; then
            echo "::error::OpenCode 执行失败"
            exit 1
          fi
          
          echo "=== 🔍 推送前语法校验 ==="
          python custom_scripts/validate_syntax.py
          
          if git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "无代码变更"
            exit 0
          fi
          
          git add -A
          git commit -m "🤖 chore: OpenCode auto-fix for CI issue" || true
          
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" != "main" && "$BRANCH" != "master" ]]; then
            git push origin "$BRANCH"
          fi
