name: Upstream Sync with AI Conflict Resolver

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 */18 * * *'
  workflow_dispatch:

# 防AI幻觉配置
env:
  MAX_FILES_PER_COMMIT: 50        # 单次提交最大文件数
  MAX_LINES_PER_COMMIT: 10000     # 单次提交最大行数
  AI_TIMEOUT_MINUTES: 15          # AI操作超时时间

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_WRITE || github.token }}
          fetch-depth: 0

      - name: Clean issue notice
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🚨 Sync Fail'

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        continue-on-error: true
        with:
          upstream_sync_repo: lobehub/lobehub
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.ACTION_WRITE || github.token }}
          test_mode: false

      # ===== Track 2: Python AI 冲突解决 =====
      - name: Setup Python
        if: steps.sync.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.sync.outcome == 'failure'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml

      - name: Track 2 - Resolve conflicts with AI (Python)
        id: track2
        if: steps.sync.outcome == 'failure'
        continue-on-error: true
        env:
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QINIU_MODEL_LIST: ${{ secrets.QINIU_MODEL_LIST }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ACTION_WRITE: ${{ secrets.ACTION_WRITE || github.token }}
        run: |
          echo "=== Track 2: Python AI 冲突解决 ==="
          python custom_scripts/resolve_upstream_conflicts.py

      # ===== Track 3: OpenCode 深度修复 =====
      - name: Setup OpenCode & OhMyOpenCode (Track 3)
        if: steps.track2.outcome == 'failure'
        run: |
          echo "=== Track 2 失败，启动 OpenCode 深度修复 ==="
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          npm install -g opencode-ai oh-my-openagent
          oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=no --skip-auth

      - name: Track 3 - Run OpenCode Agent
        id: track3
        if: steps.track2.outcome == 'failure'
        timeout-minutes: ${{ env.AI_TIMEOUT_MINUTES }}
        env:
          DMXAPI_API_KEY: ${{ secrets.DMXAPI_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BLTCY_API_KEY: ${{ secrets.BLTCY_API_KEY }}
          BLTCY_PROXY_URL: ${{ secrets.BLTCY_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ACTION_WRITE: ${{ secrets.ACTION_WRITE || github.token }}
          GH_TOKEN: ${{ secrets.ACTION_WRITE || github.token }}
        run: |
          set -euo pipefail
          
          git config --local --unset-all http.https://github.com/.extraheader || true
          git fetch origin main
          git checkout main || git checkout -b main
          git reset --hard origin/main
          git clean -fd
          
          # 显示当前幻觉评分
          echo "=== 📊 当前模型幻觉评分 ==="
          python custom_scripts/pick_best_model.py --show-scores
          
          # 选择最佳模型（考虑幻觉评分）
          BEST_MODEL=$(python custom_scripts/pick_best_model.py)
          SMALL_MODEL=$(python custom_scripts/pick_best_model.py --small)
          echo "Track 3 选定模型: $BEST_MODEL (轻量: $SMALL_MODEL)"
          
          # 保存模型到文件，供后续步骤使用
          echo "BEST_MODEL=$BEST_MODEL" >> $GITHUB_ENV
          
          if [ "$BEST_MODEL" = "NO_MODEL_AVAILABLE" ]; then
            echo "::error::无可用模型，Track 3 终止"
            exit 1
          fi
          
          python custom_scripts/pick_best_model.py --opencode-config > opencode.json
          mkdir -p ~/.config/opencode
          echo '{"providers": {}}' > ~/.config/opencode/oh-my-opencode.json
          
          CONFLICTED=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")
          if [ -z "$CONFLICTED" ]; then
            echo "无冲突文件，跳过 Track 3"
            exit 0
          fi
          
          echo "冲突文件列表:"
          echo "$CONFLICTED"
          
          FIX_SUCCEEDED=false
          
          echo "尝试 oh-my-opencode..."
          # 读取 AGENTS.md 全局要求
          AGENTS_PROMPT=""
          if [ -f "AGENTS.md" ]; then
            AGENTS_PROMPT="【全局要求 - 必须遵守】$(cat AGENTS.md)\n【AI 协作与模型质量管理】请在解决冲突时实时搜索获取最新框架资料以防幻觉。若发现本次所选模型产生幻觉，将在后续阶段降低其优先级打分。同时请确保 Commit message 显示是由 $BEST_MODEL 完成。"
          fi
          oh-my-opencode run --model "$BEST_MODEL" "$AGENTS_PROMPT\n\n分析上游同步产生的合并冲突。冲突文件: $CONFLICTED。请智能合并冲突，保留上游的重要更新同时保留本地定制。修复后提交。退出。" 2>&1 | tee opencode_output.log || true
          
          if grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
            echo "::warning::oh-my-opencode 运行异常，准备 fallback..."
            # 记录模型错误
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "model_error"
          else
            FIX_SUCCEEDED=true
          fi
          
          if [ "$FIX_SUCCEEDED" = "false" ]; then
            echo "尝试 opencode run..."
            opencode run --model "$BEST_MODEL" "$AGENTS_PROMPT\n\n解决上游同步的合并冲突。智能合并，保留重要更新。修复后提交（提交信息请带上模型来源: $BEST_MODEL）。退出。" 2>&1 | tee opencode_output.log || true
            if ! grep -qi "ProviderModelNotFoundError\|Error: Model not found\|session.error\|UnknownError" opencode_output.log; then
              FIX_SUCCEEDED=true
            else
              python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "model_error"
            fi
          fi
          
          rm -f opencode_output.log
          
          if [ "$FIX_SUCCEEDED" != "true" ]; then
            echo "::error::Track 3 AI 修复失败"
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo "::error::AI 运行完成但未产生任何代码更改"
            # 记录幻觉：无变更
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "no_changes"
            exit 1
          fi

          # === 🔒 防AI幻觉验证机制 ===
          echo "=== 🔒 防AI幻觉验证 ==="
          
          # 1. 检查变更文件数量
          FILE_COUNT=$(git diff --cached --name-only | wc -l)
          echo "变更文件数: $FILE_COUNT (上限: $MAX_FILES_PER_COMMIT)"
          if [ $FILE_COUNT -gt $MAX_FILES_PER_COMMIT ]; then
            echo "::error::🚨 疑似AI幻觉！变更文件数($FILE_COUNT)超过上限($MAX_FILES_PER_COMMIT)，拒绝提交"
            # 记录幻觉：文件数过多
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "too_many_files" "{\"file_count\": $FILE_COUNT}"
            git checkout -- .
            git clean -fd
            exit 1
          fi
          
          # 2. 检查变更行数
          LINE_COUNT=$(git diff --cached --stat | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          echo "新增行数: $LINE_COUNT (上限: $MAX_LINES_PER_COMMIT)"
          if [ "$LINE_COUNT" -gt $MAX_LINES_PER_COMMIT ]; then
            echo "::error::🚨 疑似AI幻觉！新增行数($LINE_COUNT)超过上限($MAX_LINES_PER_COMMIT)，拒绝提交"
            # 记录幻觉：行数过多
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "too_many_lines" "{\"line_count\": $LINE_COUNT}"
            git checkout -- .
            git clean -fd
            exit 1
          fi
          
          # 3. 检查是否包含不应该出现的文件类型
          SUSPICIOUS_FILES=$(git diff --cached --name-only | grep -E '\.env|\.pem|\.key|credentials|secrets' || true)
          if [ -n "$SUSPICIOUS_FILES" ]; then
            echo "::error::🚨 疑似AI幻觉！检测到敏感文件变更: $SUSPICIOUS_FILES"
            # 记录幻觉：敏感文件
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "sensitive_files" "{\"files\": \"$SUSPICIOUS_FILES\"}"
            git checkout -- .
            git clean -fd
            exit 1
          fi

          # === 推送前语法校验 ===
          echo "=== 🔍 推送前语法校验 ==="
          if ! python custom_scripts/validate_syntax.py; then
            echo "::error::语法校验失败，拒绝推送"
            # 记录幻觉：语法错误
            python custom_scripts/pick_best_model.py --record "$BEST_MODEL" "syntax_error"
            git checkout -- .
            git clean -fd
            exit 1
          fi
          echo "✅ 语法校验通过"
          
          git commit -m "🔀 chore: auto-resolve upstream merge conflicts with OpenCode (Model: $BEST_MODEL)"
          
          # 提交幻觉评分文件（如果有更新）
          if [ -f ".ai_hallucination_scores.json" ]; then
            git add .ai_hallucination_scores.json
            git commit --amend --no-edit || true
          fi
          
          git remote set-url origin https://${ACTION_WRITE}@github.com/${{ github.repository }}.git
          git pull --rebase origin main || true
          git push origin HEAD:main || { echo "::error::Push failed"; exit 1; }
          
          echo "Track 3 修复成功并已推送"
          echo "FIX_SUCCEEDED=true" >> $GITHUB_ENV

      # ===== 幻觉评分同步 =====
      - name: Sync hallucination scores
        if: always() && env.BEST_MODEL != ''
        run: |
          echo "=== 📊 同步幻觉评分 ==="
          if [ -f ".ai_hallucination_scores.json" ]; then
            echo "当前评分状态:"
            python custom_scripts/pick_best_model.py --show-scores
            
            # 如果有变更，提交评分文件
            if git diff --quiet .ai_hallucination_scores.json 2>/dev/null; then
              echo "评分文件无变更"
            else
              echo "提交更新的评分文件..."
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .ai_hallucination_scores.json
              git commit -m "📊 chore: update AI hallucination scores"
              git push origin HEAD:main || true
            fi
          fi

      - name: Sync check
        if: failure()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-issue'
          title: '🚨 同步失败 | Sync Fail'
          labels: '🚨 Sync Fail'
          body: |
            上游同步工作流失败，Track 2 和 Track 3 AI 修复均未能解决冲突。

            请手动检查并解决冲突。

            Upstream sync workflow failed. Both Track 2 and Track 3 AI fixes could not resolve conflicts.

            Please manually check and resolve conflicts.

            ![](https://github-production-user-asset-6210df.s3.amazonaws.com/17870709/273954625-df80c890-0822-4ac2-95e6-c990785cbed5.png)

            [LobeChat]: https://github.com/lobehub/lobe-chat
            [Tutorial]: https://lobehub.com/docs/self-hosting/advanced/upstream-sync
