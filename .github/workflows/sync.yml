name: Upstream Sync

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
  SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
  BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
  VOLCENGINE_CODING_API_KEY: ${{ secrets.VOLCENGINE_CODING_API_KEY }}
  VOLCENGINE_AGENT_PLAN_API_KEY: ${{ secrets.VOLCENGINE_AGENT_PLAN_API_KEY }}
  QIANFAN_API_KEY: ${{ secrets.QIANFAN_API_KEY }}
  QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
  MODELSCOPE_GLM5_API_KEY: ${{ secrets.MODELSCOPE_GLM5_API_KEY }}
  MIMO_TOKENPLAN_API_KEY: ${{ secrets.MIMO_TOKENPLAN_API_KEY }}
  ATOMGIT_GLM5_API_KEY: ${{ secrets.ATOMGIT_GLM5_API_KEY }}

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ===== Track 1: Fast-forward / Merge =====
      - name: Track 1 - Fast-forward or merge
        id: track1
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/lobehub/lobehub.git 2>/dev/null || true
          git fetch upstream main

          FORK_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          echo "fork=$FORK_SHA"
          echo "upstream=$UPSTREAM_SHA"

          if [ "$FORK_SHA" = "$UPSTREAM_SHA" ]; then
            echo "No new commits to sync"
            echo "status=up_to_date" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Try fast-forward
          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "Fast-forwarding to upstream/main"
            git merge upstream/main --ff-only
            git push origin main
            echo "status=fast_forwarded" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Try merge with no-commit first to detect conflicts
          if git merge upstream/main --no-commit --no-edit 2>/dev/null; then
            echo "Merge succeeded (no conflicts)"
            git commit -m "chore: sync upstream [auto-sync]" || true
            git push origin main
            echo "status=merged" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Conflicts detected, falling through to Track 2"
            echo "status=conflicts" >> $GITHUB_OUTPUT
          fi

      # ===== Track 2: AI Conflict Resolution =====
      - name: Track 2 - AI conflict resolution
        id: track2
        if: steps.track1.outputs.status == 'conflicts'
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "=== Track 2: AI Conflict Resolution ==="

          # Install Python deps if needed
          pip install requests pyyaml 2>/dev/null || true

          # Run the AI conflict resolver
          python3 custom_scripts/resolve_upstream_conflicts.py || {
            echo "track2_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }

          # Complete the merge
          GIT_EDITOR=true git merge --continue 2>/dev/null || git commit -m "chore: resolve upstream sync conflicts via AI [auto-sync]" || {
            echo "track2_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }

          # Push
          git push origin main || {
            echo "track2_failed=true" >> $GITHUB_OUTPUT
            exit 1
          }

          echo "track2_failed=false" >> $GITHUB_OUTPUT
          echo "status=ai_resolved" >> $GITHUB_OUTPUT

      # ===== Track 3: Syntax Validation =====
      - name: Track 3 - Syntax validation
        id: track3
        if: steps.track2.outputs.track2_failed == 'false'
        run: |
          python3 custom_scripts/validate_syntax.py || {
            echo "Syntax validation failed after AI resolution"
            exit 1
          }
          echo "status=validated" >> $GITHUB_OUTPUT

      # ===== Fallback: Create Issue =====
      - name: Create issue if unresolved
        if: steps.track2.outputs.track2_failed == 'true' || failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conflictedFiles = await exec.getExecOutput('git', ['diff', '--name-only', '--diff-filter=U']);
            const files = conflictedFiles.stdout || 'unknown';
            const isSignin = files.includes('auth/signin') || files.includes('Leaderboard') || files.includes('leaderboardService');

            let body = `Upstream sync produced merge conflicts and AI auto-resolution failed.\n\nConflicted files:\n\`\`\`\n${files}\n\`\`\`\n`;

            if (isSignin) {
              body += `\n\u26A0\uFE0F **Conflicts involve the signin/leaderboard ported area!**\n\nWhen resolving manually, preserve:\n- \`src/features/Leaderboard/\`\n- \`src/services/leaderboardService.ts\`\n- \`src/routes/auth/signin/_layout/index.tsx\` (left form + right leaderboard)\n- \`src/spa/router/authRouter.config.tsx\` (nested signin route)\n- \`leaderboard.*\` keys in \`locales/*/auth.json\`\n`;
            }

            body += `\nPlease resolve conflicts manually and push.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '\u26A0\uFE0F Upstream sync conflict - manual resolution needed' + (isSignin ? ' (signin/leaderboard area)' : ''),
              body: body,
              labels: ['upstream-sync', 'conflict']
            });